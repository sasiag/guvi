<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in </title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="auth-shell">
  <div class="auth-card">

    <aside class="auth-brand">
      <div class="brand-mark">
        <div class="mark">Guvi</div>
        <h1>Profilo</h1>
        <p>Welcome back. Sign in to view and update your profile details.</p>
      </div>
      <div class="brand-foot">New here? Use the link below to create an account.</div>
    </aside>

    <section class="auth-form-panel">
      <!--<span class="eyebrow"></span>-->
      <h2>Sign in</h2>
      <p class="auth-subtext">Enter the username or email and password you registered with.</p>

      <div id="alertBox" class="alert d-none mb-3" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="usernameOrEmail" class="form-label">Username or email</label>
          <input type="text" class="form-control" id="usernameOrEmail" placeholder="jordanlee or jordan@example.com" autocomplete="username">
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Your password" autocomplete="current-password">
        </div>

        <button type="button" id="loginBtn" class="btn btn-brand w-100 mt-2">Sign in</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="register.html">Create one</a></p>
    </section>

  </div>
</main>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/login.js"></script>
</body>
</html>
