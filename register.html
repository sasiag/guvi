<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create your account </title>
<link href="favicon.svg" type="image/x-icon" rel="icon">
<link href="favicon.svg" type="image/x-icon" rel="shortcut icon">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<main class="auth-shell">
  <div class="auth-card">

    <aside class="auth-brand">
      <div class="brand-mark">
        <div class="mark">Guvi</div>
        <h1>Profilo</h1>
        <p>Register once, sign in</p>
      </div>
      <div class="brand-foot">Already a member? Use the link below to sign in instead.</div>
    </aside>

    <section class="auth-form-panel">
     <!--- <span class="eyebrow">Step 1 of 2</span>-->
      <h2>Create your account</h2>
      <p class="auth-subtext">It only takes a minute. You can add your age, date of birth and contact details after you sign in.</p>

      <div id="alertBox" class="alert d-none mb-3" role="alert"></div>

      <form id="registerForm" novalidate>
        <div class="mb-3">
          <label for="fullName" class="form-label">Full name</label>
          <input type="text" class="form-control" id="fullName" placeholder="fullname" autocomplete="name">
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" placeholder="username" autocomplete="username">
          </div>
          <div class="col-md-6 mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="test@example.com" autocomplete="email">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="At least 6 characters" autocomplete="new-password">
          </div>
          <div class="col-md-6 mb-3">
            <label for="confirmPassword" class="form-label">Confirm password</label>
            <input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter password" autocomplete="new-password">
          </div>
        </div>

        <button type="button" id="registerBtn" class="btn btn-brand w-100 mt-2">Create account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
    </section>

  </div>
</main>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/register.js"></script>
</body>
</html>
